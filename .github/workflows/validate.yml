name: Validate (PR)

# Runs on every pull request into main. Two parallel gates:
#   1. lint     - ESLint (LWC/Aura JS) + PMD Apex static analysis
#   2. validate - check-only deploy + Apex tests (nothing is saved to the org)
# Both must pass before the PR can merge.

on:
  pull_request:
    branches: [main]
    paths:
      - "force-app/**"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"

# Cancel an in-progress run if the PR is updated again.
concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint + PMD)
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # Full history so we can diff against the PR base.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Compute the files changed in THIS PR and split them per linter.
      # --diff-filter=ACMR ignores deleted files (nothing to lint).
      - name: Determine changed files
        run: |
          git diff --name-only --diff-filter=ACMR "$BASE_SHA...$HEAD_SHA" > changed.txt
          echo "Files changed in this PR:"; cat changed.txt
          grep -E '/(lwc|aura)/.*\.js$' changed.txt > eslint_files.txt || true
          grep -E '\.(cls|trigger)$'    changed.txt > pmd_files.txt    || true

      # ESLint runs only on changed LWC/Aura JS, using the project's eslint.config.js.
      - name: ESLint (changed LWC / Aura JS only)
        run: |
          if [ ! -s eslint_files.txt ]; then
            echo "No changed LWC/Aura JS files — skipping ESLint."
            exit 0
          fi
          echo "Linting:"; cat eslint_files.txt
          npx eslint $(cat eslint_files.txt)

      - name: Set up Java (required by PMD)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Salesforce CLI + Code Analyzer
        run: |
          npm install --global @salesforce/cli@latest
          sf plugins install code-analyzer@latest

      # PMD analyzes only the changed Apex files (--target), with force-app kept as
      # context (--workspace). Fails on High (2)+ severity. Tune --severity-threshold
      # (1=Critical … 5=Info) to change strictness.
      - name: PMD (changed Apex only) — fail on High+ severity
        run: |
          if [ ! -s pmd_files.txt ]; then
            echo "No changed Apex files — skipping PMD."
            exit 0
          fi
          echo "Analyzing:"; cat pmd_files.txt
          TARGETS=$(paste -sd, pmd_files.txt)
          sf code-analyzer run \
            --workspace force-app \
            --target "$TARGETS" \
            --rule-selector pmd \
            --severity-threshold 2 \
            --view detail

  validate:
    name: Validate deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli@latest

      - name: Authenticate to target org
        shell: bash
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./auth-url.txt
          sf org login sfdx-url --sfdx-url-file ./auth-url.txt --alias target --set-default
          rm -f ./auth-url.txt

      # RunSpecifiedTests validates only the tests for the metadata in this repo.
      # (The target org has pre-existing unrelated tests/coverage debt, so
      # RunLocalTests would fail the pipeline for reasons outside this project.
      # In a fuller pipeline you would compute this test list from the diff.)
      - name: Validate deploy (check-only) + run tests
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level RunSpecifiedTests \
            --tests AccountControllerTest \
            --target-org target

  claude-review:
    name: Claude PR review
    runs-on: ubuntu-latest
    # Advisory only: this job posts an AI review comment but never blocks the PR.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install --global @anthropic-ai/claude-code

      - name: Run Claude headless review of the PR diff
        env:
          # Uses your Claude subscription (Pro/Max) via a long-lived OAuth token
          # generated locally with `claude setup-token` — no API token charges.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA...$HEAD_SHA" > pr.diff
          PROMPT=$(cat <<'EOF'
          You are reviewing a Salesforce DX pull request. Base your review ONLY on
          the unified diff provided on stdin — do not assume anything not shown.
          Focus on: Apex security (CRUD/FLS, with/without sharing), governor-limit
          and bulkification issues, test quality/coverage, and LWC/JS best practices.
          Respond in GitHub-flavored markdown: start with a one-line overall verdict,
          then a short bulleted list of findings, each tagged [High]/[Medium]/[Low].
          If nothing notable, say so briefly. Keep it under ~250 words.
          EOF
          )
          # Headless, non-interactive, no tools — pure review of the piped diff.
          cat pr.diff | claude -p "$PROMPT" \
            --model claude-sonnet-4-6 \
            --allowed-tools "" \
            --output-format text > review.md
          echo "----- review -----"
          cat review.md

      - name: Post review as a PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## 🤖 Claude PR review"
            echo
            cat review.md
            echo
            echo "_Advisory review — generated headlessly with \`claude -p\`. Not a merge gate._"
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md
